<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA core -->
    <meta name="theme-color" content="#060b18" />
    <link rel="manifest" href="/manifest.json" />

    <!-- App identity -->
    <title>SleepSeed 🌙</title>
    <meta name="description" content="Personalised AI bedtime stories for your child — written in seconds" />
    <meta name="application-name" content="SleepSeed" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SleepSeed" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/moon.svg" />

    <!-- Open Graph (sharing previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SleepSeed 🌙" />
    <meta property="og:description" content="Personalised AI bedtime stories for your child — written in seconds" />
    <meta property="og:url" content="https://sleepseed.app" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SleepSeed 🌙" />
    <meta name="twitter:description" content="Personalised AI bedtime stories for your child — written in seconds" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Font preconnect — eliminates DNS/TLS delay for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Critical font preload — load Fraunces (serif) early so text doesn't flash -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,700&family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@300;400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,700&family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@300;400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" />

    <!-- Inline critical styles for loading screen — prevents white flash -->
    <style>
      body{margin:0;background:#060912}
      #root{min-height:100vh}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        // Unregister any old broken service workers
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((r) => r.unregister());
        });
      }
    </script>
  </body>
</html>
