<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA core -->
    <meta name="theme-color" content="#060b18" />
    <link rel="manifest" href="/manifest.json" />

    <!-- App identity -->
    <title>SleepSeed 🌙</title>
    <meta name="description" content="Personalised AI bedtime stories for your child — written in seconds" />
    <meta name="application-name" content="SleepSeed" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SleepSeed" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/moon.svg" />

    <!-- Open Graph (sharing previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SleepSeed 🌙" />
    <meta property="og:description" content="Personalised AI bedtime stories for your child — written in seconds" />
    <meta property="og:url" content="https://sleepseed.app" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SleepSeed 🌙" />
    <meta name="twitter:description" content="Personalised AI bedtime stories for your child — written in seconds" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Font preconnect — eliminates DNS/TLS delay for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Consolidated font load — all families used across the app -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&family=Nunito:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&family=Baloo+2:wght@500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Patrick+Hand&family=Kalam:wght@300;400;700&family=Cormorant+Garamond:ital,wght@1,600&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&family=Nunito:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&family=Baloo+2:wght@500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Patrick+Hand&family=Kalam:wght@300;400;700&family=Cormorant+Garamond:ital,wght@1,600&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" />

    <!-- Inline critical styles for loading screen — prevents white flash -->
    <style>
      body{margin:0;background:#060912;overflow-x:hidden}
      #root{min-height:100vh;position:relative;background:#060912;overflow-x:hidden}
      @keyframes shimmer{0%{transform:translateX(-130%)}100%{transform:translateX(230%)}}
      @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
      @keyframes dotPulse{0%{box-shadow:0 0 0 0 rgba(245,184,76,.5)}100%{box-shadow:0 0 0 10px rgba(245,184,76,0)}}
      @keyframes cometPulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}
      @keyframes celebrationPop{0%,100%{transform:scale(1)}15%{transform:scale(1.13)}32%{transform:scale(.97)}48%{transform:scale(1.05)}64%{transform:scale(1)}}
      @keyframes breathe{0%,100%{transform:scale(1);opacity:.82}50%{transform:scale(1.05);opacity:1}}
      @keyframes polaroidDevelop{0%{filter:brightness(2.5) saturate(0) contrast(.6);opacity:.3}30%{filter:brightness(1.6) saturate(.3) contrast(.8);opacity:.7}70%{filter:brightness(1.1) saturate(.8) contrast(.95);opacity:.95}100%{filter:brightness(1) saturate(1) contrast(1);opacity:1}}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        // Unregister any old broken service workers
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((r) => r.unregister());
        });
      }
    </script>
  </body>
</html>
